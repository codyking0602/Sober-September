name: Patch Daily Reps Chart

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html chart
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('public/index.html')
          s = p.read_text()
          s = s.replace('Sober September V40 Stable Event Logic', 'Sober September V41 Daily Reps Chart')
          s = s.replace('<h2 style="font-size:24px">Progress Chart</h2><div class="small">Cumulative points</div>${renderChart(s)}', '<h2 style="font-size:24px">Daily Reps</h2><div class="small">Reps logged by day</div>${renderChart(s)}')
          new_chart = r'''function renderChart(s){if(!s.days.length)return`<div class="chart"></div>`;const vals=s.days.map(d=>({date:d.date,val:d.reps||0}));const max=Math.max(...vals.map(v=>v.val),1),w=460,h=190,pL=46,pR=38,pT=24,pB=34;const yTicks=[0,Math.ceil(max/2),Math.ceil(max)];const grid=yTicks.map(v=>{const y=h-pB-(v/max)*(h-pT-pB);return`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="rgba(148,163,184,.18)" stroke-width="1"/><text class="chart-label" x="${pL-8}" y="${y+4}" text-anchor="end">${v}</text>`}).join("");const pts=vals.map((v,i)=>{const x=pL+(i/(Math.max(vals.length-1,1)))*(w-pL-pR);const y=h-pB-(v.val/max)*(h-pT-pB);return[x,y,v]});const line=pts.map(p=>p[0]+","+p[1]).join(" ");const area=`${pL},${h-pB} `+line+` ${w-pR},${h-pB}`;const last=pts[pts.length-1];const dots=pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#7dd3fc"/>`).join("");const monthTicks=pts.map((p,i)=>i===0||i===pts.length-1?`<text class="chart-label" x="${p[0]}" y="${h-10}" text-anchor="${i===0?'start':'end'}">${niceDate(p[2].date)}</text>`:"").join("");return`<div class="chart"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="chartFill" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#7dd3fc" stop-opacity=".32"/><stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/></linearGradient></defs>${grid}<line x1="${pL}" y1="${pT}" x2="${pL}" y2="${h-pB}" stroke="rgba(148,163,184,.22)"/><polygon points="${area}" fill="url(#chartFill)"/><polyline points="${line}" fill="none" stroke="#7dd3fc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 0 10px rgba(125,211,252,.45))"/>${dots}<circle cx="${last[0]}" cy="${last[1]}" r="7" fill="#22c55e" stroke="#dcfce7" stroke-width="2"/><text class="chart-value" x="${Math.max(pL,last[0]-24)}" y="${Math.max(last[1]-14,22)}" text-anchor="end">${Math.round(last[2].val)} reps</text>${monthTicks}</svg></div>`}
function renderLeague(stats,rows){'''
          s = re.sub(r'function renderChart\(s\)\{.*?\}function renderLeague\(stats,rows\)\{', new_chart, s, flags=re.S)
          Path('.github/workflows/patch-daily-reps-chart.yml').unlink()
          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html .github/workflows/patch-daily-reps-chart.yml
          git commit -m "Switch athlete progress chart to daily reps"
          git push
