name: Patch live Saturday max simple

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch file
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('public/index.html')
          s = p.read_text()
          s = s.replace('function renderAthleteCards(stats){const isMax=getChallengePhase().phase==="maxout";', 'function getTodayMaxFor(name,rows){const todayKey=dayKey(new Date());const found=(rows||[]).filter(r=>r.name===name&&r.key===todayKey&&Number(r.max)>0).sort((a,b)=>Number(b.max||0)-Number(a.max||0))[0];return found?Number(found.max||0):0}\nfunction renderAthleteCards(stats){const isMax=getChallengePhase().phase==="maxout";')
          s = s.replace('⚡ Saturday Max: ${s.best} reps', '⚡ Saturday Max: ${getTodayMaxFor(s.name,window.currentRows||[]) ? getTodayMaxFor(s.name,window.currentRows||[]) + " reps" : "No entry"}')
          s = s.replace('function renderMaxLeader(stats){const leader=[...stats].sort((a,b)=>b.best-a.best)[0];document.getElementById("maxLeaderName").textContent=leader?.name||"No Maxes Yet";document.getElementById("maxLeaderSet").textContent=leader?.best?`${leader.best} reps`:"Waiting for first set"}', 'function renderMaxLeader(stats,rows){const todayKey=dayKey(new Date());const todayRows=(rows||[]).filter(r=>r.key===todayKey&&Number(r.max)>0);const leader=[...todayRows].sort((a,b)=>Number(b.max||0)-Number(a.max||0))[0];document.getElementById("maxLeaderName").textContent=leader?.name||"No Entries Yet";document.getElementById("maxLeaderSet").textContent=leader?.max?`${leader.max} reps`:"Waiting For First Max Set"}')
          Path('.github/workflows/patch-live-max-simple.yml').unlink()
          p.write_text(s)
          PY
      - name: Commit
        run: |
          git config user.name actions
          git config user.email actions@github.com
          git add public/index.html .github/workflows/patch-live-max-simple.yml
          git commit -m "Use today-only max values for Max-Out skin"
          git push
