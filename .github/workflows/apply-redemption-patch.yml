name: Apply Redemption Weekend patch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-redemption:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch script
        run: python3 .github/scripts/apply_redemption_patch.py
      - name: Remove temporary patch files
        run: |
          rm -f .github/scripts/apply_redemption_patch.py
          rm -f .github/workflows/apply-redemption-patch.yml
      - name: Commit app changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html .github/scripts/apply_redemption_patch.py .github/workflows/apply-redemption-patch.yml
          git commit -m "Apply Redemption Weekend skin"
          git push
